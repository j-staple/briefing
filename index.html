<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Briefing</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Briefing">
<meta name="theme-color" content="#16191e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  /* Decryptor shell — static, zero external dependencies, by design (Risk #11). */
  html,body{margin:0;height:100%;background:#16191e;color:#e8ecf1;
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased}
  .stage{min-height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;padding:24px;box-sizing:border-box;text-align:center}
  .mark{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.14em;
    text-transform:uppercase;font-size:13px;color:#8aa4ff}
  .dot{width:10px;height:10px;border-radius:50%;background:#ffb347;
    box-shadow:0 0 14px 3px rgba(255,179,71,.55);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.72);opacity:.55}}
  #msg{color:#98a2ad;font-size:14px;max-width:34ch}
  form{display:flex;flex-direction:column;gap:12px;width:min(340px,86vw)}
  form p{margin:0;color:#98a2ad;font-size:14px}
  input{background:#1d222a;border:1px solid #2a3140;border-radius:10px;color:#e8ecf1;
    padding:12px 14px;font:14px ui-monospace,Menlo,monospace;outline:none;width:100%;box-sizing:border-box}
  input:focus{border-color:#8aa4ff}
  button{background:#8aa4ff;border:0;border-radius:10px;color:#101319;font-weight:600;
    font-size:15px;padding:12px;cursor:pointer}
  button.ghost{background:transparent;color:#8aa4ff;border:1px solid #2a3140}
  [hidden]{display:none !important}
</style>
</head>
<body>
<div class="stage">
  <div class="mark"><span class="dot"></span>Briefing</div>
  <div id="msg">opening…</div>
  <form id="keyform" hidden>
    <p id="formmsg">Enter the briefing key once — it never leaves this device.</p>
    <input id="key" autocomplete="off" autocapitalize="off" autocorrect="off"
           spellcheck="false" placeholder="paste key" inputmode="text">
    <button type="submit">Unlock</button>
  </form>
  <button id="retry" class="ghost" hidden>Retry</button>
  <noscript>This briefing needs JavaScript.</noscript>
</div>
<script>
"use strict";
const $ = id => document.getElementById(id);
const b64u = s => {
  s = s.replace(/-/g, "+").replace(/_/g, "/");
  while (s.length % 4) s += "=";
  const bin = atob(s), out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
};
function askKey(message) {
  $("msg").hidden = true; $("retry").hidden = true;
  if (message) $("formmsg").textContent = message;
  $("keyform").hidden = false;
  $("key").focus();
}
function fail(message) {
  $("msg").hidden = false; $("msg").textContent = message;
  $("retry").hidden = false;
}
async function openBriefing() {
  const stored = localStorage.getItem("dv_key");
  if (!stored) return askKey();
  $("keyform").hidden = true; $("retry").hidden = true;
  $("msg").hidden = false; $("msg").textContent = "opening…";

  let env;
  try {
    const r = await fetch("briefing.enc?ts=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error(r.status);
    env = await r.json();
  } catch (e) {
    return fail("Can't reach the briefing — check your connection.");
  }
  try {
    const key = await crypto.subtle.importKey("raw", b64u(stored), "AES-GCM", false, ["decrypt"]);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64u(env.iv) }, key, b64u(env.data));
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch (e) {
    localStorage.removeItem("dv_key");
    askKey("That key didn't unlock it — check and re-enter.");
  }
}
$("keyform").addEventListener("submit", ev => {
  ev.preventDefault();
  const v = $("key").value.trim();
  if (!v) return;
  localStorage.setItem("dv_key", v);
  openBriefing();
});
$("retry").addEventListener("click", () => openBriefing());
openBriefing();
</script>
</body>
</html>
